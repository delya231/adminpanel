<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Админ-панель</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap-icons-1.13.1/bootstrap-icons.css">
    <link rel="stylesheet" href="css/base.css">
    <script src="js/bootstrap.bundle.min.js" defer></script>
    <script src="js/theme.js" defer></script>
</head>

<body class="bg-body-tertiary">

    <div class="container-fluid p-0">
        <div class="row g-0">

            <div class="col-md-3 col-lg-2 desktop-sidebar d-none d-md-block bg-body border-end vh-100 sticky-top">
                <div class="d-flex flex-column h-100 p-3">
                    <div class="mb-4 mt-2">
                        <h4 class="fw-semibold">
                            <i class="bi bi-kanban me-2"></i> Админ-панель
                        </h4>
                        <hr class="my-2" />
                    </div>
                    <nav class="nav nav-pills flex-column gap-3 mb-auto">
                        <a href="index.html" class="nav-link text-body rounded-3 fw-semibold">
                            <i class="bi bi-house me-2"></i> Главная
                        </a>
                        <a href="users.html" class="nav-link text-body rounded-3 fw-semibold" aria-current="page">
                            <i class="bi bi-people me-2"></i> Пользователи
                        </a>
                        <a href="orders.html" class="nav-link text-body rounded-3 fw-semibold">
                            <i class="bi bi-cart3 me-2"></i> Заказы
                        </a>
                        <a href="items.html" class="nav-link active bg-primary text-white rounded-3 fw-semibold">
                            <i class="bi bi-box-seam me-2"></i> Товары
                        </a>
                    </nav>

                    <div class="mt-auto">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="fs-5 fw-semibold"><i class="bi bi-moon-stars me-2"></i>Тёмная тема</span>
                            <div class="form-check form-switch form-switch-lg">
                                <input class="form-check-input theme-switch themeToggle" type="checkbox"
                                    role="switch" />
                                <label class="form-check-label" for="themeToggle"></label>
                            </div>
                        </div>
                        <a href="auth.html" class="btn btn-danger w-100 logout-btn fw-semibold" type="button">
                            <i class="bi bi-box-arrow-right me-1"></i> Выйти
                        </a>
                    </div>
                </div>
            </div>

            <div class="offcanvas offcanvas-start offcanvas-sidebar" tabindex="-1" id="mobileMenuCanvas"
                aria-labelledby="offcanvasMenuLabel">
                <div class="offcanvas-header bg-body-secondary">
                    <h5 class="offcanvas-title fw-semibold" id="offcanvasMenuLabel">
                        <i class="bi bi-kanban me-1"></i> Навигация
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
                </div>
                <div class="offcanvas-body d-flex flex-column p-3">
                    <nav class="nav nav-pills flex-column gap-3 mb-auto">
                        <a href="index.html" class="nav-link text-body rounded-3 fw-semibold" aria-current="page">
                            <i class="bi bi-house me-2"></i> Главная
                        </a>
                        <a href="users.html" class="nav-link text-body rounded-3 fw-semibold">
                            <i class="bi bi-people me-2"></i> Пользователи
                        </a>
                        <a href="orders.html" class="nav-link text-body rounded-3 fw-semibold">
                            <i class="bi bi-cart3 me-2"></i> Заказы
                        </a>
                        <a href="items.html" class="nav-link active bg-primary text-white  rounded-3 fw-semibold">
                            <i class="bi bi-box-seam me-2"></i> Товары
                        </a>
                    </nav>
                    <div class="mt-auto">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="fs-5 fw-semibold"><i class="bi bi-moon-stars me-2"></i>Тёмная тема</span>
                            <div class="form-check form-switch form-switch-lg">
                                <input class="form-check-input theme-switch-mobile themeToggle" type="checkbox"
                                    role="switch" />
                                <label class="form-check-label" for="themeToggle"></label>
                            </div>
                        </div>
                        <a href="auth.html" class="btn btn-danger w-100 logout-btn fw-semibold" type="button">
                            <i class="bi bi-box-arrow-right me-1"></i> Выйти
                        </a>
                </div>
            </div>

            <div class="col-12 col-md-9 col-lg-10 main-wrapper">
                <div
                    class="d-md-none bg-body-secondary border-bottom p-3 d-flex justify-content-between align-items-center sticky-top">
                    <h5 class="mb-0 fw-semibold">
                        <i class="bi bi-kanban me-1"></i> Админ-панель 
                    </h5>
                    <button class="btn btn-outline-primary" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#mobileMenuCanvas" aria-controls="mobileMenuCanvas">
                        <i class="bi bi-list me-1"></i>
                    </button>
                </div>

                <div class="mt-3 p-md-4">
                    <div class="container-fluid">
                        <div class="row g-4">
                            <div class="col-12 col-lg-5 col-xl-4">
                                <div class="row g-2">
                                    <div class="col-12 position-relative">
                                        <img src="https://magicalflower.ru/image/cache/catalog/51rozafotoset/new/13.04.21_0008-1000x1000.webp"
                                            class="w-100 rounded-3 shadow-sm" alt="Главная фотка">
                                        <button type="button"
                                            class="btn position-absolute btn-success end-0 me-2 mt-1 pt-1 rounded-5"><i
                                                class="bi bi-pencil-fill"></i></button>
                                    </div>
                                    <div class="col-4 position-relative">
                                        <img src="https://magicalflower.ru/image/cache/catalog/51rozafotoset/new/13.04.21_0008-1000x1000.webp"
                                            class="w-100 rounded-3 shadow-sm" alt="">
                                        <button type="button"
                                            class="btn position-absolute btn-success end-0 me-2 mt-1 pt-1 rounded-5 change-img"><i
                                                class="bi bi-pencil-fill"></i></button>
                                    </div>
                                    <div class="col-4 position-relative">
                                        <img src="https://magicalflower.ru/image/cache/catalog/51rozafotoset/new/13.04.21_0008-1000x1000.webp"
                                            class="w-100 rounded-3 shadow-sm" alt="">
                                        <button type="button"
                                            class="btn position-absolute btn-success end-0 me-2 mt-1 pt-1 rounded-5 change-img"><i
                                                class="bi bi-pencil-fill"></i></button>
                                    </div>
                                    <div class="col-4 position-relative">
                                        <img src="https://magicalflower.ru/image/cache/catalog/51rozafotoset/new/13.04.21_0008-1000x1000.webp"
                                            class="w-100 rounded-3 shadow-sm" alt="">
                                        <button type="button"
                                            class="btn position-absolute btn-success end-0 me-2 mt-1 pt-1 rounded-5 change-img"><i
                                                class="bi bi-pencil-fill"></i></button>
                                    </div>
                                </div>
                            </div>


                            <div class="col-12 col-lg-7 col-xl-8 mb-3">
                                <form>
                                    <div class="g-3 shadow-sm bg-body  rounded-3 p-3 pt-2 w-100">
                                        <div class="row g-3">
                                            <div class="col-12">
                                                <label for="id" class="form-label">ID товара</label>
                                                <input id="id" type="text" class="form-control" placeholder="Введите id"
                                                    value="1023">
                                            </div>
                                            <div class="col-12">
                                                <label for="name" class="form-label">Название товара</label>
                                                <input id="name" type="text" class="form-control"
                                                    placeholder="Введите название" value="15 белых роз">
                                            </div>
                                            <div class="col-12">
                                                <label for="description" class="form-label">Описание товара</label>
                                                <input id="description" type="text" class="form-control"
                                                    placeholder="Введите описание" value="Роза Эквадор, 70 см - 15 шт.">
                                            </div>
                                            <div class="col-12">
                                                <label for="price" class="form-label">Цена товара</label>
                                                <input id="price" type="text" class="form-control"
                                                    placeholder="Введите цену" value="5500">
                                            </div>
                                            <div class="col-12">
                                                <button type="submit"
                                                    class="btn btn-success w-100 mt-2 mb-2">Изменить</button>
                                            </div>
                                        </div>

                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js"
        integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>
</body>

</html>
